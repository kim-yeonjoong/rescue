name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: cd apps/rescue && swiftlint lint --strict

  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: apps/rescue/.build
          key: ${{ runner.os }}-spm-${{ hashFiles('apps/rescue/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-
      - name: Run tests
        run: cd apps/rescue && swift test
