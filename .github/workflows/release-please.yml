name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs['apps/rescue--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build-and-release:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Build release binary
        run: cd apps/rescue && swift build -c release

      - name: Create .app bundle
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          cd apps/rescue
          VERSION=$(echo "$TAG_NAME" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          VERSION="${VERSION:-1.0.0}"

          APP_DIR="Rescue.app"
          CONTENTS_DIR="$APP_DIR/Contents"
          MACOS_DIR="$CONTENTS_DIR/MacOS"
          RESOURCES_DIR="$CONTENTS_DIR/Resources"
          BUILD_DIR=".build/release"

          mkdir -p "$MACOS_DIR" "$RESOURCES_DIR"

          cp "$BUILD_DIR/Rescue" "$MACOS_DIR/Rescue"

          if [ -d "$BUILD_DIR/Rescue_Rescue.bundle" ]; then
            cp -r "$BUILD_DIR/Rescue_Rescue.bundle" "$RESOURCES_DIR/"
          fi

          ICON_SRC="Sources/Rescue/Resources/AppIcon.icns"
          if [ -f "$ICON_SRC" ]; then
            cp "$ICON_SRC" "$RESOURCES_DIR/AppIcon.icns"
          fi

          for lproj_dir in "$BUILD_DIR/Rescue_Rescue.bundle"/*.lproj; do
            if [ -d "$lproj_dir" ]; then
              cp -r "$lproj_dir" "$RESOURCES_DIR/"
            fi
          done

          cat > "$CONTENTS_DIR/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>Rescue</string>
              <key>CFBundleIdentifier</key>
              <string>dev.rescue</string>
              <key>CFBundleName</key>
              <string>Rescue</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
              <key>NSUserNotificationAlertStyle</key>
              <string>alert</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
          </dict>
          </plist>
          PLIST

      - name: Codesign
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          cd apps/rescue
          if [ -n "$DEVELOPER_ID_APPLICATION" ]; then
            codesign --force --deep --sign "$DEVELOPER_ID_APPLICATION" Rescue.app
          else
            codesign --force --deep --sign - Rescue.app
          fi

      - name: Package and upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          cd apps/rescue
          ditto -c -k --keepParent Rescue.app Rescue-macos.zip
          gh release upload "$TAG_NAME" Rescue-macos.zip

      - name: Append install instructions to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          EXISTING=$(gh release view "$TAG_NAME" --json body -q .body)
          read -r -d '' FOOTER << 'EOF'

          ---

          ## Installation

          1. Download **Rescue-macos.zip** above and unzip
          2. Move `Rescue.app` to `/Applications`
          3. On first launch, macOS will block the app. To allow it, run:
             ```
             xattr -d com.apple.quarantine /Applications/Rescue.app
             ```
             Or go to **System Settings → Privacy & Security → Security** and click **Open Anyway**.
          EOF
          gh release edit "$TAG_NAME" --notes "${EXISTING}${FOOTER}"
