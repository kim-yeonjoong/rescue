line_length:
  warning: 120
  error: 200

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 50
  error: 100

opt_in_rules:
  - empty_count
  - superfluous_else
  - unused_parameter
  - prefer_key_path
  - force_unwrapping
  - anonymous_argument_in_multiline_closure

disabled_rules:
  - trailing_comma
  - opening_brace
  - identifier_name

excluded:
  - .build
  - Tests
